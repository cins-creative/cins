<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 22px; background: var(--bg-page); box-sizing: border-box; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 656px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 80px; height: 80px; background: var(--cins-blue-soft); border: 2px solid var(--cins-blue); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); }
  .name { font-size: 11px; font-weight: 600; color: var(--fg-2); }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius: 6px;"></div><div class="name">xs</div><div class="meta">6px</div></div>
  <div class="cell"><div class="box" style="border-radius: 10px;"></div><div class="name">sm</div><div class="meta">10px</div></div>
  <div class="cell"><div class="box" style="border-radius: 14px;"></div><div class="name">md</div><div class="meta">14px</div></div>
  <div class="cell"><div class="box" style="border-radius: 20px;"></div><div class="name">lg</div><div class="meta">20px</div></div>
  <div class="cell"><div class="box" style="border-radius: 28px;"></div><div class="name">xl</div><div class="meta">28px</div></div>
  <div class="cell"><div class="box" style="border-radius: 999px;"></div><div class="name">pill</div><div class="meta">999px</div></div>
</div>
</body>
</html>
