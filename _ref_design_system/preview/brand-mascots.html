<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mascots</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 20px; background: var(--bg-page); box-sizing: border-box; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; width: 660px; }
  .card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .chip { width: 24px; height: 24px; border-radius: 6px; }
  .img-box { width: 110px; height: 70px; display: flex; align-items: center; justify-content: center; }
  .img-box img { max-width: 100%; max-height: 100%; }
  .role { font-size: 13px; font-weight: 600; color: var(--fg-2); text-align: center; }
</style>
</head>
<body>
<div class="grid">
  <div class="card"><div class="chip" style="background: var(--cins-yellow);"></div><div class="img-box"><img src="../assets/mascot-artist.png"></div><div class="role">Artist</div></div>
  <div class="card"><div class="chip" style="background: var(--cins-violet);"></div><div class="img-box"><img src="../assets/mascot-technical-artist.png"></div><div class="role">Technical Artist</div></div>
  <div class="card"><div class="chip" style="background: var(--cins-orange);"></div><div class="img-box"><img src="../assets/mascot-manager.png"></div><div class="role">Manager</div></div>
  <div class="card"><div class="chip" style="background: var(--cins-mint);"></div><div class="img-box"><img src="../assets/mascot-supporter.png"></div><div class="role">Supporter</div></div>
</div>
</body>
</html>
