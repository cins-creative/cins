<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Editorial Serif (Crimson Pro)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 24px; background: var(--bg-page); box-sizing: border-box; }
  .row { display: flex; align-items: flex-start; gap: 16px; padding: 4px 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); width: 120px; flex-shrink: 0; padding-top: 6px; line-height: 1.4; }
  .col { max-width: 480px; }
  .pull { font-family: var(--font-serif); font-weight: 600; font-style: italic; font-size: 26px; line-height: 1.25; color: var(--cins-blue); }
  .editorial { font-family: var(--font-serif); font-weight: 400; font-size: 17px; line-height: 1.6; color: var(--fg-2); }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">pull-quote · 26 · 600 italic</div>
    <div class="pull col">"Sáng tạo không phải là một ngành — đó là cách bạn nhìn thế giới."</div>
  </div>
  <div class="row">
    <div class="meta">editorial · 17/27 · 400</div>
    <div class="editorial col">Mỗi ngành sáng tạo thị giác đều có một câu chuyện riêng. Animator thổi hồn vào nhân vật, Designer kiến tạo trải nghiệm, và Director định hình tầm nhìn.</div>
  </div>
</body>
</html>
