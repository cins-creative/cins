<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Promo Card — A · B · C</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 22px; background: var(--bg-page); box-sizing: border-box; font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 22px; width: 660px; }
  .label-meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  /* A · sticker floater */
  .a {
    width: 380px; background: white; border-radius: var(--radius-lg);
    border: 1px solid var(--border); box-shadow: var(--shadow-md);
    padding: 16px; display: flex; gap: 14px; align-items: center; position: relative;
  }
  .a .illust { width: 130px; height: 90px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .a .illust img { max-width: 100%; max-height: 100%; }
  .a .eyebrow { font-size: 12px; color: var(--fg-3); }
  .a .title { font-family: var(--font-display); font-size: 30px; line-height: 1; margin-top: 4px; color: var(--cins-blue); letter-spacing: 0.5px; }
  .a .cta { display: inline-block; margin-top: 8px; padding: 5px 14px; border-radius: 999px; background: var(--neutral-200); color: var(--fg-2); font-size: 12px; font-weight: 500; }
  .a .floater { position: absolute; top: -22px; left: 56px; width: 50px; height: 50px; background: var(--cins-yellow); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }

  /* B · full color background */
  .b { width: 380px; background: var(--cins-blue); border-radius: var(--radius-lg); padding: 18px; display: flex; gap: 14px; align-items: center; color: white; position: relative; overflow: hidden; box-shadow: var(--shadow-md); }
  .b::before { content: ""; position: absolute; right: -30px; top: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .b::after { content: ""; position: absolute; left: -20px; bottom: -30px; width: 80px; height: 80px; border-radius: 30px; background: var(--cins-yellow); opacity: 0.95; }
  .b .illust { width: 130px; height: 110px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
  .b .illust img { max-width: 100%; max-height: 100%; filter: drop-shadow(0 8px 14px rgba(0,0,0,0.25)); }
  .b .body { position: relative; z-index: 1; }
  .b .eyebrow { font-size: 11px; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.08em; }
  .b .title { font-family: var(--font-display); font-size: 32px; line-height: 1; margin-top: 6px; letter-spacing: 0.5px; }
  .b .cta { display: inline-block; margin-top: 10px; padding: 7px 16px; border-radius: 999px; background: var(--cins-yellow); color: var(--ink-display); font-size: 12px; font-weight: 700; }

  /* C · banner wide gradient */
  .c { width: 600px; border-radius: var(--radius-lg); padding: 18px 22px; display: flex; gap: 16px; align-items: center; position: relative; overflow: hidden; background: linear-gradient(95deg, var(--cins-yellow) 0%, var(--cins-orange) 50%, var(--cins-lilac) 100%); }
  .c .body { flex: 1; }
  .c .eyebrow { font-size: 11px; color: var(--ink-display); text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.7; }
  .c .title { font-family: var(--font-display); font-size: 36px; line-height: 1; margin-top: 4px; color: var(--ink-display); letter-spacing: 0.5px; }
  .c .sub { font-size: 13px; color: var(--ink-display); opacity: 0.8; margin-top: 4px; }
  .c .cta { margin-top: 10px; padding: 8px 18px; border-radius: 999px; background: var(--ink-display); color: white; font-size: 12px; font-weight: 700; display: inline-block; }
  .c .illust { width: 140px; height: 120px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .c .illust img { max-width: 100%; max-height: 100%; filter: drop-shadow(0 8px 14px rgba(0,0,0,0.18)); }
</style>
</head>
<body>
<div class="stack">

  <div>
    <div class="label-meta">A · sticker floater (default)</div>
    <div class="a">
      <div class="floater">🥚</div>
      <div class="illust"><img src="../assets/illustration-gamepad.png"></div>
      <div class="body">
        <div class="eyebrow">Khám phá ngành công nghiệp</div>
        <div class="title">Game</div>
        <div class="cta">Xem ngay</div>
      </div>
    </div>
  </div>

  <div>
    <div class="label-meta">B · full-color (blue) — bold</div>
    <div class="b">
      <div class="illust"><img src="../assets/illustration-gamepad.png"></div>
      <div class="body">
        <div class="eyebrow">Khám phá</div>
        <div class="title">Game</div>
        <div class="cta">Xem ngay →</div>
      </div>
    </div>
  </div>

  <div>
    <div class="label-meta">C · wide gradient banner (hero)</div>
    <div class="c">
      <div class="body">
        <div class="eyebrow">Trải nghiệm CINs</div>
        <div class="title">Tìm ngành học sáng tạo của bạn</div>
        <div class="sub">12+ lĩnh vực thị giác · 80+ trường đào tạo · Nội dung cập nhật hàng tuần</div>
        <div class="cta">Bắt đầu ngay →</div>
      </div>
      <div class="illust"><img src="../assets/illustration-gamepad.png"></div>
    </div>
  </div>

</div>
</body>
</html>
