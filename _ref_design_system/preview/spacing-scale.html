<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 22px; background: var(--bg-page); box-sizing: border-box; font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 6px; width: 656px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .name { width: 50px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { background: var(--cins-blue); height: 14px; border-radius: 4px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
</style>
</head>
<body>
<div class="stack">
  <div class="row"><div class="name">space-1</div><div class="bar" style="width:4px;"></div><div class="px">4px</div></div>
  <div class="row"><div class="name">space-2</div><div class="bar" style="width:8px;"></div><div class="px">8px</div></div>
  <div class="row"><div class="name">space-3</div><div class="bar" style="width:12px;"></div><div class="px">12px</div></div>
  <div class="row"><div class="name">space-4</div><div class="bar" style="width:16px;"></div><div class="px">16px</div></div>
  <div class="row"><div class="name">space-5</div><div class="bar" style="width:20px;"></div><div class="px">20px</div></div>
  <div class="row"><div class="name">space-6</div><div class="bar" style="width:24px;"></div><div class="px">24px</div></div>
  <div class="row"><div class="name">space-8</div><div class="bar" style="width:32px;"></div><div class="px">32px</div></div>
  <div class="row"><div class="name">space-10</div><div class="bar" style="width:40px;"></div><div class="px">40px</div></div>
  <div class="row"><div class="name">space-12</div><div class="bar" style="width:48px;"></div><div class="px">48px</div></div>
  <div class="row"><div class="name">space-16</div><div class="bar" style="width:64px;"></div><div class="px">64px</div></div>
  <div class="row"><div class="name">space-20</div><div class="bar" style="width:80px;"></div><div class="px">80px</div></div>
</div>
</body>
</html>
