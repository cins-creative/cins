<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pattern Shapes</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 22px; background: var(--bg-page); box-sizing: border-box; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 656px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shape { width: 80px; height: 80px; }
  .roundsq { background: var(--cins-orange); border-radius: 18px; }
  .circle { background: var(--cins-yellow); border-radius: 50%; }
  .pill { background: var(--cins-mint); border-radius: 999px; height: 30px; width: 100px; transform: rotate(-30deg); margin-top: 24px; }
  .blob { background: var(--cins-violet); width: 100px; height: 70px; border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; margin-top: 8px; }
  .lbl { font-size: 12px; color: var(--fg-3); font-weight: 500; }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><div class="shape roundsq"></div><div class="lbl">Bo góc</div></div>
  <div class="cell"><div class="shape circle"></div><div class="lbl">Hình tròn</div></div>
  <div class="cell"><div class="pill"></div><div class="lbl">Hình bo góc</div></div>
  <div class="cell"><div class="blob"></div><div class="lbl">Tự do bo góc</div></div>
</div>
</body>
</html>
