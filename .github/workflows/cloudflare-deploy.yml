name: Cloudflare Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Worker cins
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare deploy environment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE: ${{ secrets.CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_CF_IMAGES_ACCOUNT_HASH: ${{ secrets.NEXT_PUBLIC_CF_IMAGES_ACCOUNT_HASH }}
          NEXT_PUBLIC_BUNNY_LIBRARY_ID: ${{ secrets.NEXT_PUBLIC_BUNNY_LIBRARY_ID }}
          BUNNY_LIBRARY_ID: ${{ secrets.BUNNY_LIBRARY_ID }}
          NEXT_PUBLIC_BUNNY_CDN_HOSTNAME: ${{ secrets.NEXT_PUBLIC_BUNNY_CDN_HOSTNAME }}
          BUNNY_CDN_HOSTNAME: ${{ secrets.BUNNY_CDN_HOSTNAME }}
          BUNNY_CND_HOSTNAME: ${{ secrets.BUNNY_CND_HOSTNAME }}
          NEXT_PUBLIC_ARTICLE_INLINE_IMAGE_UPLOAD_TOKEN: ${{ secrets.NEXT_PUBLIC_ARTICLE_INLINE_IMAGE_UPLOAD_TOKEN }}
          ARTICLE_INLINE_IMAGE_UPLOAD_TOKEN: ${{ secrets.ARTICLE_INLINE_IMAGE_UPLOAD_TOKEN }}
          NEXT_PUBLIC_CAREER_THUMB_UPLOAD_TOKEN: ${{ secrets.NEXT_PUBLIC_CAREER_THUMB_UPLOAD_TOKEN }}
        run: bash scripts/ci-prepare-deploy-env.sh

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
